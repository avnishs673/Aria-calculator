<!DOCTYPE html>
<html>
<head>
    <title>Land Area Calculator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9em; color: #555; }
        select, input { width: 100%; padding: 12px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #28a745; color: white; border: none; padding: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #218838; }
        .results-box { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid #28a745; }
        .res-item { display: flex; justify-content: space-between; margin: 8px 0; font-size: 1.1em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .hidden { display: none; }
        .total-row { color: #28a745; font-weight: bold; border-bottom: 2px solid #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h2>Land Calculator</h2>
    
    <label>Select Plot Shape:</label>
    <select id="shape" onchange="toggleInputs()">
        <option value="irregular">Irregular Plot (4 Sides)</option>
        <option value="triangle">Triangle Plot (3 Sides)</option>
    </select>

    <div id="irregular-inputs">
        <label>East Side:</label>
        <input type="number" id="east" placeholder="Feet">
        <label>West Side:</label>
        <input type="number" id="west" placeholder="Feet">
        <label>North Side:</label>
        <input type="number" id="north" placeholder="Feet">
        <label>South Side:</label>
        <input type="number" id="south" placeholder="Feet">
    </div>

    <div id="triangle-inputs" class="hidden">
        <label>Lamb (Perpendicular):</label>
        <input type="number" id="lamb" placeholder="Feet">
        <label>Aadhar (Base):</label>
        <input type="number" id="aadhar" placeholder="Feet">
        <label>Vikaran (Hypotenuse):</label>
        <input type="number" id="vikaran" placeholder="Feet">
    </div>

    <button onclick="calculateLand()">Calculate Area</button>

    <div id="displayArea" class="results-box" style="display:none;">
        <div class="res-item total-row"><span>Total Area:</span> <span id="total">0</span></div>
        <div class="res-item"><span>Beegha:</span> <b id="beegha">0</b></div>
        <div class="res-item"><span>Biswa (Bise):</span> <b id="biswa">0</b></div>
        <div class="res-item"><span>Biswansi:</span> <b id="biswansi">0</b></div>
    </div>
</div>

<script>
    function toggleInputs() {
        const shape = document.getElementById('shape').value;
        document.getElementById('irregular-inputs').classList.toggle('hidden', shape !== 'irregular');
        document.getElementById('triangle-inputs').classList.toggle('hidden', shape !== 'triangle');
        document.getElementById('displayArea').style.display = 'none';
    }

    function calculateLand() {
        const shape = document.getElementById('shape').value;
        let area = 0;

        if (shape === 'irregular') {
            const e = parseFloat(document.getElementById('east').value) || 0;
            const w = parseFloat(document.getElementById('west').value) || 0;
            const n = parseFloat(document.getElementById('north').value) || 0;
            const s = parseFloat(document.getElementById('south').value) || 0;
            if (e && w && n && s) {
                area = (3 * (e + w) * (n + s)) / 4;
            }
        } else {
            const l = parseFloat(document.getElementById('lamb').value) || 0;
            const a = parseFloat(document.getElementById('aadhar').value) || 0;
            const v = parseFloat(document.getElementById('vikaran').value) || 0;
            if (l && a && v) {
                const sides = [l, a, v].sort((x, y) => x - y);
                // Multiplies the two shortest sides
                area = ((sides[0] * sides[1]) / 2) * 3;
            }
        }

        if (area > 0) {
            let remaining = area;
            const beegha = Math.floor(remaining / 400);
            remaining = remaining % 400;
            const biswa = Math.floor(remaining / 20);
            const biswansi = remaining % 20;

            document.getElementById('total').innerText = area.toFixed(2);
            document.getElementById('beegha').innerText = beegha;
            document.getElementById('biswa').innerText = biswa;
            document.getElementById('biswansi').innerText = biswansi.toFixed(2);
            document.getElementById('displayArea').style.display = 'block';
        } else {
            alert("Please enter values for all sides!");
        }
    }
</script>

</body>
</html>
